<div class="container pt-3">
    <div class="row">
        <div class="col-12">
            <button mat-flat-button color="primary" class="me-3" (click)="addHero()">Add Hero</button>
            <button mat-button class="me-3" (click)="changePriority()">Change Priority</button>
            <button mat-button class="me-3" (click)="setVisibility()">Set Visibility</button>
        </div>
    </div>

    <mat-divider class="my-3"></mat-divider>

    <div class="row mt-4">
        <div class="col-12 col-lg-auto">
            <mat-form-field class="w-100" appearance="fill" color="accent">
                <mat-label>Filter By Status</mat-label>
                <mat-select [formControl]="filterByStatus" (selectionChange)="statusFilter()">
                    <mat-option value="All">All</mat-option>
                    <mat-option *ngFor="let status of buildStatus" [value]="status">{{status}}</mat-option>
                </mat-select>
            </mat-form-field>
        </div>
        <div class="col-12 col-lg-8">
            <mat-chip-list aria-label="tags" class="organizer-tag-group" multiple>
                <mat-chip (click)="setChipFilter('all')" [ngClass]="chipFilter.indexOf('all') >= 0 ? 'chip-all' : ''">ALL</mat-chip>
                <mat-chip *ngFor="let tag of tags" [ngClass]="chipFilter.indexOf(tag.toLowerCase()) >= 0 ? 'chip-' + tag.toLowerCase() : ''" (click)="setChipFilter(tag)"><small>{{tag}}</small></mat-chip>
            </mat-chip-list>
        </div>
    </div>

    <section class="row mt-4">
        <div class="col-12 col-md-6 col-lg-4 col-xl-4 col-xxl-2 mb-4" *ngFor="let hero of filteredHeroes | orderBy:order">
            <ng-container *ngIf="verifyChipFilter(hero.tags)">
                <app-hero-card [hero]="hero" [heroes]="allHeroes" [artifacts]="allArtifacts" (onEditEvent)="updateHero($event)" (onDeleteEvent)="deleteHero($event)" (onChangeBuildStatus)="changeHeroBuildStatus($event)"></app-hero-card>
            </ng-container>
        </div>
    </section>
</div>
