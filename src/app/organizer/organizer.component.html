<div class="container-fluid pt-3">
    <div class="row">
        <div class="col-12">
            <button mat-flat-button color="primary" (click)="addHero()">Add Hero</button>
        </div>
    </div>

    <mat-divider class="my-3"></mat-divider>

    <div class="row mt-4 justify-content-center">
        <div class="col-12">
            <mat-chip-list aria-label="tags" multiple>
                <mat-chip (click)="setChipFilter('all')" [ngClass]="chipFilter.indexOf('all') >= 0 ? 'chip-all' : ''">ALL</mat-chip>
                <mat-chip *ngFor="let tag of tags" [ngClass]="chipFilter.indexOf(tag.toLowerCase()) >= 0 ? 'chip-' + tag.toLowerCase() : ''" (click)="setChipFilter(tag)"><small>{{tag}}</small></mat-chip>
            </mat-chip-list>
        </div>
    </div>

    <section class="row mt-4">
        <div class="col-12 col-sm-6 col-md-4 col-lg-2 mb-3" *ngFor="let hero of filteredHeroes | orderBy:order">
            <ng-container *ngIf="verifyChipFilter(hero.tags)">
                <app-hero-card [hero]="hero"></app-hero-card>
            </ng-container>
        </div>
    </section>
</div>
