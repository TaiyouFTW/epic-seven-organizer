<div class="container-fluid pt-3">
    <div class="row">
        <div class="col-12">
            <button mat-flat-button color="primary" (click)="addHero()">Add Hero</button>

        </div>
    </div>

    <mat-divider class="my-5"></mat-divider>

    <div class="row mt-4">
        <div class="col-12 col-sm-6 col-md-4 col-lg-2 mb-3" *ngFor="let hero of heroes">
            <app-hero-card [hero]="hero"></app-hero-card>
        </div>
    </div>
</div>
