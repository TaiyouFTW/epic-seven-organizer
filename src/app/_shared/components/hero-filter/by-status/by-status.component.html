<mat-form-field class="w-100" appearance="fill" color="accent">
    <mat-label>Filter By Status</mat-label>
    <mat-select [formControl]="filterByStatus" (selectionChange)="buildStatus()">
        <mat-option value="All">All</mat-option>
        <mat-option *ngFor="let status of listStatus" [value]="status">{{status}}</mat-option>
    </mat-select>
</mat-form-field>
