<div class="hero-card rounded-3 pointer container py-3">
    <div class="row">
        <div class="col-12 d-flex justify-content-center">
            <app-portrait [heroCode]="hero.code" [name]="hero.name" [role]="hero.jobCode" [element]="hero.attributeCode" [grade]="hero.grade"></app-portrait>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <h6 class="text-uppercase text-center my-2">{{hero.name}}</h6>
        </div>
    </div>
    <div class="row">
        <div class="col-6">
            <p>Level: {{hero.level}}</p>
        </div>
        <div class="col-6">
            <p>Skills: +{{hero.skillsLevel}}</p>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <!-- TODO: Add Sets -->
            <p>Set: </p>
        </div>
    </div>
</div>
